<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch Project Finder</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .project-card:hover { transform: translateY(-3px); transition: all 0.25s ease; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .proxy-status { transition: all 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- App Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight mb-2">Scratch Project Finder</h1>
            <p class="text-gray-500 text-sm">Find all shared projects and IDs for any user.</p>
            
            <!-- Connection Status -->
            <div id="connStatus" class="mt-4 inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600 border border-gray-200">
                <span class="w-2 h-2 rounded-full bg-yellow-400 mr-2 animate-pulse"></span>
                Testing Connection...
            </div>
        </header>

        <!-- Search Card -->
        <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 mb-8 border border-gray-100">
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="relative flex-grow">
                    <input type="text" id="username" 
                           class="block w-full pl-4 pr-10 py-4 rounded-xl border border-gray-200 focus:ring-4 focus:ring-orange-100 focus:border-orange-500 text-gray-900 transition-all outline-none"
                           placeholder="Enter username (e.g., griffpatch)">
                </div>
                <button onclick="handleSearch()" id="searchBtn"
                        class="bg-orange-600 hover:bg-orange-700 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-orange-200 transition-all active:scale-95 flex items-center justify-center">
                    <span id="btnText">Find Projects</span>
                    <svg id="spinner" class="hidden animate-spin ml-3 h-5 w-5 text-white" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>

            <!-- Error Box -->
            <div id="errorBox" class="mt-6 p-4 bg-red-50 border border-red-100 rounded-xl hidden">
                <div class="flex">
                    <svg class="h-5 w-5 text-red-500 mr-3" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" />
                    </svg>
                    <div>
                        <p id="errorMsg" class="text-sm text-red-800 font-semibold"></p>
                        <p class="text-xs text-red-600 mt-1">Note: Browsers often block these requests if an ad-blocker is on.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="resultsWrapper" class="hidden">
            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 px-2">
                <div class="text-center sm:text-left">
                    <h2 class="text-2xl font-bold text-gray-800">Shared Projects</h2>
                    <p class="text-sm text-gray-500">Found <span id="projectCount" class="font-bold text-orange-600">0</span> items</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="bulkCopyIds()" class="text-sm bg-white border border-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50 transition-all font-medium">Bulk Copy IDs</button>
                </div>
            </div>
            
            <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

            <div id="loadMoreContainer" class="mt-10 text-center hidden">
                <button onclick="loadMore()" class="bg-white border-2 border-gray-100 text-gray-600 px-10 py-3 rounded-full font-bold hover:border-orange-200 hover:text-orange-600 transition-all shadow-sm">
                    Load More
                </button>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20 bg-white rounded-3xl border-4 border-dotted border-gray-100">
            <p class="text-gray-400 font-medium italic">No projects found. Check the username spelling!</p>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-500 z-50">
        <div class="bg-gray-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-medium">
            <span id="toastText">Copied!</span>
        </div>
    </div>

    <script>
        let currentOffset = 0;
        let currentUsername = '';
        const limit = 40;
        let allProjects = [];
        let activeProxy = null;

        // List of proxies to try
        const PROXY_LIST = [
            { name: 'CorsProxy.io', url: (target) => `https://corsproxy.io{encodeURIComponent(target)}`, type: 'direct' },
            { name: 'CORS.lol', url: (target) => `https://cors.lol{encodeURIComponent(target)}`, type: 'direct' },
            { name: 'AllOrigins', url: (target) => `https://api.allorigins.win{encodeURIComponent(target)}`, type: 'wrapped' }
        ];

        // Run connection test on load
        window.onload = async () => {
            const statusEl = document.getElementById('connStatus');
            for (let p of PROXY_LIST) {
                try {
                    // Test with a simple GET to Scratch (User 1 exists always)
                    const testUrl = p.url('https://api.scratch.mit.edu');
                    const res = await fetch(testUrl);
                    if (res.ok) {
                        activeProxy = p;
                        statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500 mr-2"></span> Connection Ready: ${p.name}`;
                        statusEl.className = statusEl.className.replace('bg-gray-100 text-gray-600', 'bg-green-50 text-green-700 border-green-200');
                        return;
                    }
                } catch (e) {}
            }
            statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500 mr-2"></span> Connection Error: All proxies blocked`;
            statusEl.className = statusEl.className.replace('bg-gray-100 text-gray-600', 'bg-red-50 text-red-700 border-red-200');
        };

        async function handleSearch() {
            const username = document.getElementById('username').value.trim();
            if (!username) return;

            currentUsername = username;
            currentOffset = 0;
            allProjects = [];
            setLoading(true);
            showError('');
            
            document.getElementById('projectsGrid').innerHTML = '';
            document.getElementById('resultsWrapper').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            await performFetch();
            setLoading(false);
        }

        async function performFetch() {
            if (!activeProxy) {
                showError("No working proxy found. Please check your internet or disable ad-blockers.");
                return;
            }

            const target = `https://api.scratch.mit.edu{currentUsername}/projects?limit=${limit}&offset=${currentOffset}`;
            
            try {
                const response = await fetch(activeProxy.url(target));
                if (!response.ok) throw new Error("Scratch User not found or API error.");
                
                let data = await response.json();
                if (activeProxy.type === 'wrapped') data = JSON.parse(data.contents);

                if (Array.isArray(data)) {
                    handleData(data);
                } else {
                    throw new Error("Invalid response format.");
                }
            } catch (err) {
                showError(err.message);
            }
        }

        function handleData(projects) {
            if (projects.length === 0 && allProjects.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            allProjects = [...allProjects, ...projects];
            projects.forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card bg-white p-6 rounded-2xl border border-gray-100 flex flex-col justify-between';
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-gray-900 truncate pr-4 text-lg">${p.title}</h3>
                            <button onclick="copyToClipboard('${p.id}')" class="text-[10px] bg-orange-100 text-orange-700 px-3 py-1 rounded-full font-black uppercase hover:bg-orange-200 transition-colors">Copy ID</button>
                        </div>
                        <code class="text-xs text-gray-400 font-mono">ID: ${p.id}</code>
                    </div>
                    <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-50">
                        <a href="https://scratch.mit.edu{p.id}" target="_blank" class="text-sm text-blue-600 font-bold hover:underline">View on Scratch</a>
                        <span class="text-[10px] text-gray-400 font-medium">${new Date(p.history.created).toLocaleDateString()}</span>
                    </div>
                `;
                document.getElementById('projectsGrid').appendChild(card);
            });

            document.getElementById('resultsWrapper').classList.remove('hidden');
            document.getElementById('projectCount').innerText = allProjects.length;
            document.getElementById('loadMoreContainer').classList.toggle('hidden', projects.length < limit);
        }

        async function loadMore() {
            currentOffset += limit;
            const btn = document.querySelector('#loadMoreContainer button');
            btn.innerText = 'Loading...';
            await performFetch();
            btn.innerText = 'Load More';
        }

        function bulkCopyIds() {
            const text = allProjects.map(p => p.id).join(', ');
            copyToClipboard(text);
            showToast(`Copied ${allProjects.length} IDs!`);
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("ID Copied!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').innerText = msg;
            toast.classList.replace('translate-y-20', 'translate-y-0');
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.replace('translate-y-0', 'translate-y-20');
                toast.classList.replace('opacity-100', 'opacity-0');
            }, 2500);
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('searchBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            btn.disabled = isLoading;
            spinner.classList.toggle('hidden', !isLoading);
            btnText.innerText = isLoading ? 'Searching...' : 'Find Projects';
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            const text = document.getElementById('errorMsg');
            if (msg) {
                text.innerText = msg;
                box.classList.remove('hidden');
            } else {
                box.classList.add('hidden');
            }
        }

        document.getElementById('username').addEventListener('keypress', (e) => e.key === 'Enter' && handleSearch());
    </script>
</body>
</html>
