<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch Project Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');

        :root {
            --scratch-orange: #FFAB19;
            --scratch-blue: #4D97FF;
            --scratch-purple: #855CD6;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
        }

        .scratch-gradient {
            background: linear-gradient(135deg, var(--scratch-blue), var(--scratch-purple));
        }

        .project-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--scratch-orange);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 text-gray-800">
                Scratch <span class="text-orange-500">Project</span> Finder
            </h1>
            <p class="text-gray-600">Enter a username to explore their creative portfolio</p>
        </header>

        <!-- Search Bar -->
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 flex flex-col md:flex-row gap-4 items-center border border-gray-100">
            <div class="relative w-full">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </span>
                <input 
                    type="text" 
                    id="usernameInput" 
                    placeholder="Search Scratch username..." 
                    class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all"
                >
            </div>
            <button 
                onclick="fetchProjects()" 
                class="w-full md:w-auto px-8 py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2"
            >
                Find Projects
            </button>
        </div>

        <!-- Status & Results -->
        <div id="statusArea" class="text-center mb-6 hidden">
            <div class="flex justify-center mb-4">
                <div class="loader"></div>
            </div>
            <p class="text-gray-500 italic">Exploring the Scratch database...</p>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Projects will appear here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-20">
            <div class="text-gray-300 mb-4 flex justify-center">
                <svg class="w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <h3 class="text-xl font-medium text-gray-400">No projects to show yet</h3>
            <p class="text-gray-400">Try searching for a user like 'griffpatch'</p>
        </div>
    </div>

    <script>
        const input = document.getElementById('usernameInput');
        const grid = document.getElementById('resultsGrid');
        const statusArea = document.getElementById('statusArea');
        const emptyState = document.getElementById('emptyState');

        // Allow 'Enter' key to trigger search
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchProjects();
        });

        async function fetchProjects() {
            const username = input.value.trim();
            if (!username) {
                showToast("Please enter a username", "error");
                return;
            }

            // Reset UI
            grid.innerHTML = '';
            statusArea.classList.remove('hidden');
            emptyState.classList.add('hidden');

            try {
                // Scratch API limits to 20/40 projects by default. 
                // We'll fetch the most recent ones as per the standard endpoint.
                const response = await fetch(`https://api.scratch.mit.edu/users/${username}/projects`);
                
                if (!response.ok) {
                    throw new Error(response.status === 404 ? "User not found" : "API error");
                }

                const projects = await response.json();

                statusArea.classList.add('hidden');

                if (projects.length === 0) {
                    showToast("No public projects found for this user.", "info");
                    emptyState.classList.remove('hidden');
                    return;
                }

                displayProjects(projects);
            } catch (error) {
                statusArea.classList.add('hidden');
                emptyState.classList.remove('hidden');
                showToast(error.message, "error");
            }
        }

        function displayProjects(projects) {
            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card bg-white rounded-2xl overflow-hidden border border-gray-100 flex flex-col';
                
                // Note: api.scratch.mit.edu returns limited info. 
                // Images usually come from assets.scratch.mit.edu but require the md5ext.
                // We'll stick to the text info requested: Title and ID.
                
                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded-full uppercase tracking-wider">
                                Project ID: ${project.id}
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2 truncate" title="${project.title}">
                            ${project.title}
                        </h3>
                        <p class="text-sm text-gray-500 mb-6">
                            Created on: ${new Date(project.history.created).toLocaleDateString()}
                        </p>
                        <a 
                            href="https://scratch.mit.edu{project.id}" 
                            target="_blank"
                            class="mt-auto inline-flex items-center justify-center w-full py-3 bg-gray-800 hover:bg-black text-white text-sm font-semibold rounded-xl transition-all gap-2"
                        >
                            View on Scratch
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-white font-medium shadow-lg z-50 transition-all transform translate-y-0 ${
                type === 'error' ? 'bg-red-500' : 'bg-blue-500'
            }`;
            toast.innerText = message;
            
            document.body.appendChild(toast);
            
            if(type === 'error') input.classList.add('error-shake', 'border-red-300');
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 20px)';
                input.classList.remove('error-shake', 'border-red-300');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }
    </script>
</body>
</html>
