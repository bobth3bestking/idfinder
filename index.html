<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch Project Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');

        :root {
            --scratch-orange: #FFAB19;
            --scratch-blue: #4D97FF;
            --scratch-purple: #855CD6;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
        }

        .scratch-gradient {
            background: linear-gradient(135deg, var(--scratch-blue), var(--scratch-purple));
        }

        .project-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--scratch-orange);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .search-mode-tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .search-mode-tab {
            padding: 0.75rem 1.5rem;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 500;
            color: #9ca3af;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .search-mode-tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .search-mode-tab:hover {
            color: #6b7280;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 text-gray-800">
                Scratch <span class="text-orange-500">Project</span> Finder
            </h1>
            <p class="text-gray-600">Enter a username to explore their creative portfolio</p>
        </header>

        <!-- View Option Selector -->
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-100">
            <label class="block text-sm font-semibold text-gray-700 mb-3">View Projects On:</label>
            <div class="flex flex-col md:flex-row gap-4">
                <label class="flex items-center cursor-pointer">
                    <input 
                        type="radio" 
                        name="viewOption" 
                        value="scratch" 
                        checked 
                        class="w-4 h-4 text-blue-500 bg-gray-100 border-gray-300"
                    >
                    <span class="ml-3 text-gray-700 font-medium">Scratch (Original)</span>
                </label>
                <label class="flex items-center cursor-pointer">
                    <input 
                        type="radio" 
                        name="viewOption" 
                        value="scratch-remix" 
                        class="w-4 h-4 text-purple-500 bg-gray-100 border-gray-300"
                    >
                    <span class="ml-3 text-gray-700 font-medium">Scratch Remix</span>
                </label>
            </div>
        </div>

        <!-- Search Mode Tabs -->
        <div class="bg-white rounded-t-2xl shadow-sm border border-gray-100 border-b-0">
            <div class="p-6 search-mode-tabs">
                <button class="search-mode-tab active" onclick="setSearchMode('user')">
                    <svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Search by User
                </button>
                <button class="search-mode-tab" onclick="setSearchMode('project')">
                    <svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    Search by Project
                </button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="bg-white p-6 rounded-b-2xl shadow-sm mb-8 flex flex-col md:flex-row gap-4 items-center border border-gray-100 border-t-0">
            <div class="relative w-full">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </span>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search Scratch username..." 
                    class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all"
                >
            </div>
            <button 
                onclick="handleSearch()" 
                class="w-full md:w-auto px-8 py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2"
            >
                Search
            </button>
        </div>

        <!-- Status & Results -->
        <div id="statusArea" class="text-center mb-6 hidden">
            <div class="flex justify-center mb-4">
                <div class="loader"></div>
            </div>
            <p class="text-gray-500 italic">Searching...</p>
        </div>

        <!-- Results Info -->
        <div id="resultsInfo" class="text-center mb-4 hidden">
            <p class="text-gray-600">
                Showing <span id="resultCount">0</span> results 
                <span id="filterInfo"></span>
            </p>
        </div>

        <!-- Project Search Filter (only shows in project search mode) -->
        <div id="projectFilterSection" class="bg-white p-4 rounded-lg shadow-sm mb-6 border border-gray-100 hidden">
            <div class="flex flex-col md:flex-row gap-3 items-center">
                <label class="text-sm font-semibold text-gray-700">Filter results:</label>
                <input 
                    type="text" 
                    id="projectFilter" 
                    placeholder="Filter projects by name..." 
                    class="flex-1 px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all"
                    oninput="filterProjects()"
                >
            </div>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Projects will appear here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-20">
            <div class="text-gray-300 mb-4 flex justify-center">
                <svg class="w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 0[...]
                </svg>
            </div>
            <h3 class="text-xl font-medium text-gray-400">No projects to show yet</h3>
            <p class="text-gray-400" id="emptyStateText">Try searching for a user like 'griffpatch'</p>
        </div>

        <!-- Download Section -->
        <div id="downloadSection" class="mt-12 pt-8 border-t border-gray-200 hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Export Results</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <button 
                    onclick="downloadAsText()" 
                    class="px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Download as .txt
                </button>
                <button 
                    onclick="downloadAsPhp()" 
                    class="px-6 py-3 bg-purple-500 hover:bg-purple-600 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Download as .php
                </button>
            </div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const grid = document.getElementById('resultsGrid');
        const statusArea = document.getElementById('statusArea');
        const emptyState = document.getElementById('emptyState');
        const downloadSection = document.getElementById('downloadSection');
        const projectFilterSection = document.getElementById('projectFilterSection');
        const projectFilter = document.getElementById('projectFilter');
        const resultsInfo = document.getElementById('resultsInfo');
        const resultCount = document.getElementById('resultCount');
        const filterInfo = document.getElementById('filterInfo');
        const emptyStateText = document.getElementById('emptyStateText');
        
        let currentProjects = [];
        let allUserProjects = [];
        let searchMode = 'user';

        // Allow 'Enter' key to trigger search
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        function setSearchMode(mode) {
            searchMode = mode;
            
            // Update tab styling
            document.querySelectorAll('.search-mode-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.closest('.search-mode-tab').classList.add('active');
            
            // Update placeholder and UI
            if (mode === 'user') {
                searchInput.placeholder = 'Search Scratch username...';
                emptyStateText.textContent = 'Try searching for a user like "griffpatch"';
                projectFilterSection.classList.add('hidden');
                searchInput.value = '';
            } else {
                searchInput.placeholder = 'Search for a project...';
                emptyStateText.textContent = 'Try searching for a project name like "apple"';
                projectFilterSection.classList.add('hidden');
                searchInput.value = '';
            }
            
            // Reset results
            grid.innerHTML = '';
            emptyState.classList.remove('hidden');
            downloadSection.classList.add('hidden');
            resultsInfo.classList.add('hidden');
            currentProjects = [];
            allUserProjects = [];
        }

        function getSelectedViewOption() {
            return document.querySelector('input[name="viewOption"]:checked').value;
        }

        async function handleSearch() {
            if (searchMode === 'user') {
                await fetchUserProjects();
            } else {
                await searchProjects();
            }
        }

        async function fetchUserProjects() {
            const username = searchInput.value.trim();
            if (!username) {
                showToast("Please enter a username", "error");
                return;
            }

            // Reset UI
            grid.innerHTML = '';
            statusArea.classList.remove('hidden');
            emptyState.classList.add('hidden');
            downloadSection.classList.add('hidden');
            resultsInfo.classList.add('hidden');
            projectFilterSection.classList.add('hidden');
            currentProjects = [];

            try {
                const corsUrl = `https://cors-anywhere-xygq.onrender.com/https://api.scratch.mit.edu/users/${username}/projects`;
                const response = await fetch(corsUrl);
                
                if (!response.ok) {
                    throw new Error(response.status === 404 ? "User not found" : "API error");
                }

                const projects = await response.json();
                statusArea.classList.add('hidden');

                if (projects.length === 0) {
                    showToast("No public projects found for this user.", "info");
                    emptyState.classList.remove('hidden');
                    return;
                }

                currentProjects = projects;
                allUserProjects = projects;
                displayProjects(projects);
                downloadSection.classList.remove('hidden');
                resultsInfo.classList.remove('hidden');
                resultCount.textContent = projects.length;
                filterInfo.textContent = '';
            } catch (error) {
                statusArea.classList.add('hidden');
                emptyState.classList.remove('hidden');
                showToast(error.message, "error");
            }
        }

        async function searchProjects() {
            const searchTerm = searchInput.value.trim();
            if (!searchTerm) {
                showToast("Please enter a project name to search", "error");
                return;
            }

            grid.innerHTML = '';
            statusArea.classList.remove('hidden');
            emptyState.classList.add('hidden');
            downloadSection.classList.add('hidden');
            resultsInfo.classList.add('hidden');
            projectFilterSection.classList.add('hidden');
            currentProjects = [];

            try {
                const corsUrl = `https://cors-anywhere-xygq.onrender.com/https://api.scratch.mit.edu/search/projects?q=${encodeURIComponent(searchTerm)}&limit=40`;
                const response = await fetch(corsUrl);
                
                if (!response.ok) {
                    throw new Error("Search API error");
                }

                const data = await response.json();
                const projects = data.results || data || [];
                
                statusArea.classList.add('hidden');

                if (projects.length === 0) {
                    showToast("No projects found with that name.", "info");
                    emptyState.classList.remove('hidden');
                    return;
                }

                currentProjects = projects;
                allUserProjects = projects;
                displayProjects(projects);
                downloadSection.classList.remove('hidden');
                resultsInfo.classList.remove('hidden');
                resultCount.textContent = projects.length;
                filterInfo.textContent = '';
                projectFilterSection.classList.remove('hidden');
                projectFilter.value = '';
            } catch (error) {
                statusArea.classList.add('hidden');
                emptyState.classList.remove('hidden');
                showToast(error.message, "error");
            }
        }

        function filterProjects() {
            const filterTerm = projectFilter.value.trim().toLowerCase();
            
            if (!filterTerm) {
                displayProjects(allUserProjects);
                resultCount.textContent = allUserProjects.length;
                filterInfo.textContent = '';
                return;
            }

            const filtered = allUserProjects.filter(project => 
                project.title.toLowerCase().includes(filterTerm)
            );

            if (filtered.length === 0) {
                grid.innerHTML = '';
                const noResults = document.createElement('div');
                noResults.className = 'col-span-full text-center py-12';
                noResults.innerHTML = `
                    <p class="text-gray-500 text-lg">No projects match "<strong>${filterTerm}</strong>"</p>
                `;
                grid.appendChild(noResults);
                resultCount.textContent = '0';
                filterInfo.textContent = `(filtered from ${allUserProjects.length})`;
                return;
            }

            currentProjects = filtered;
            displayProjects(filtered);
            resultCount.textContent = filtered.length;
            filterInfo.textContent = `(filtered from ${allUserProjects.length})`;
        }

        function displayProjects(projects) {
            grid.innerHTML = '';
            const viewOption = getSelectedViewOption();
            
            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card bg-white rounded-2xl overflow-hidden border border-gray-100 flex flex-col';
                
                let viewLink = '';
                let viewButtonText = '';
                let buttonColor = '';

                if (viewOption === 'scratch-remix') {
                    viewLink = `https://bobth3bestking.github.io/scratch-gui1/#${project.id}`;
                    viewButtonText = 'View on Scratch Remix';
                    buttonColor = 'bg-purple-600 hover:bg-purple-700';
                } else {
                    viewLink = `https://scratch.mit.edu/projects/${project.id}`;
                    viewButtonText = 'View on Scratch';
                    buttonColor = 'bg-gray-800 hover:bg-black';
                }
                
                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded-full uppercase tracking-wider">
                                Project ID: ${project.id}
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2 truncate" title="${project.title}">
                            ${project.title}
                        </h3>
                        <p class="text-sm text-gray-500 mb-6">
                            Created on: ${new Date(project.history.created).toLocaleDateString()}
                        </p>
                        <a 
                            href="${viewLink}" 
                            target="_blank"
                            class="mt-auto inline-flex items-center justify-center w-full py-3 ${buttonColor} text-white text-sm font-semibold rounded-xl transition-all gap-2"
                        >
                            ${viewButtonText}
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Re-render when view option changes
        document.querySelectorAll('input[name="viewOption"]').forEach(radio => {
            radio.addEventListener('change', () => {
                if (currentProjects.length > 0) {
                    grid.innerHTML = '';
                    displayProjects(currentProjects);
                }
            });
        });

        function downloadAsText() {
            if (currentProjects.length === 0) {
                showToast("No projects to download", "error");
                return;
            }

            const searchTerm = searchInput.value.trim();
            const viewOption = getSelectedViewOption();
            let textContent = searchMode === 'user' 
                ? `Scratch Projects for: ${searchTerm}\n`
                : `Scratch Projects matching: ${searchTerm}\n`;
            textContent += `View Option: ${viewOption === 'scratch-remix' ? 'Scratch Remix' : 'Scratch (Original)'}\n`;
            textContent += `Generated: ${new Date().toLocaleString()}\n`;
            textContent += `Total Projects: ${currentProjects.length}\n`;
            textContent += `${'='.repeat(60)}\n\n`;

            currentProjects.forEach((project, index) => {
                textContent += `${index + 1}. ${project.title}\n`;
                textContent += `   ID: ${project.id}\n`;
                textContent += `   Created: ${new Date(project.history.created).toLocaleDateString()}\n`;
                if (viewOption === 'scratch-remix') {
                    textContent += `   Link: https://bobth3bestking.github.io/scratch-gui1/#${project.id}\n\n`;
                } else {
                    textContent += `   Link: https://scratch.mit.edu/projects/${project.id}\n\n`;
                }
            });

            downloadFile(textContent, `scratch_projects_${searchTerm}.txt`, 'text/plain');
        }

        function downloadAsPhp() {
            if (currentProjects.length === 0) {
                showToast("No projects to download", "error");
                return;
            }

            const searchTerm = searchInput.value.trim();
            const viewOption = getSelectedViewOption();
            let phpContent = `<?php\n\n`;
            phpContent += searchMode === 'user'
                ? `// Scratch Projects for: ${searchTerm}\n`
                : `// Scratch Projects matching: ${searchTerm}\n`;
            phpContent += `// View Option: ${viewOption === 'scratch-remix' ? 'Scratch Remix' : 'Scratch (Original)'}\n`;
            phpContent += `// Generated: ${new Date().toLocaleString()}\n\n`;
            phpContent += `$projects = array(\n`;

            currentProjects.forEach((project) => {
                const link = viewOption === 'scratch-remix' 
                    ? `https://bobth3bestking.github.io/scratch-gui1/#${project.id}`
                    : `https://scratch.mit.edu/projects/${project.id}`;
                
                phpContent += `    array(\n`;
                phpContent += `        'title' => '${project.title.replace(/'/g, "\\'")}',' \n`;
                phpContent += `        'id' => ${project.id},\n`;
                phpContent += `        'created' => '${new Date(project.history.created).toLocaleDateString()}',\n`;
                phpContent += `        'link' => '${link}'\n`;
                phpContent += `    ),\n`;
            });

            phpContent += `);\n\n`;
            phpContent += `// Total projects: ${currentProjects.length}\n`;
            phpContent += `// View option: ${viewOption === 'scratch-remix' ? 'Scratch Remix' : 'Scratch (Original)'}\n`;
            phpContent += `echo 'Scratch projects: ' . count($projects);\n`;
            phpContent += `\n?>`;

            downloadFile(phpContent, `scratch_projects_${searchTerm}.php`, 'text/plain');
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`Downloaded: ${filename}`, 'success');
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-white font-medium shadow-lg z-50 transition-all transform translate-y-0 ${
                type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500'
            }`;
            toast.innerText = message;
            
            document.body.appendChild(toast);
            
            if(type === 'error') searchInput.classList.add('error-shake', 'border-red-300');
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 20px)';
                searchInput.classList.remove('error-shake', 'border-red-300');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }
    </script>
</body>
</html>
